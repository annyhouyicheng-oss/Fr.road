:root {
  --navy: #0f1628;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;overflow-x:hidden;}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:rgba(15,22,40,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.2);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.header-back{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:6px 12px;color:var(--gold);font-size:13px;cursor:pointer;text-decoration:none;}
.header-title{font-size:15px;font-weight:600;color:var(--white);}
.header-sub{font-size:11px;color:var(--gray);margin-left:auto;}

/* ── Day Tabs ── */
.day-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--navy2);border-bottom:1px solid rgba(255,255,255,0.05);}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--gray);white-space:nowrap;}
.day-tab.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);font-weight:600;}

/* ── Content ── */
.content{padding:16px;max-width:600px;margin:0 auto;}

/* ── Day Section ── */
.day-section{display:none;}
.day-section.active{display:block;}

/* ── Day Header ── */
.day-header{background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.3);border-radius:14px;padding:16px;margin-bottom:16px;}
.day-date{font-size:22px;font-weight:700;color:var(--gold2);}
.day-label{font-size:13px;color:var(--gray);margin-top:2px;}
.day-city{display:inline-block;background:rgba(201,168,76,0.2);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--gold);margin-top:8px;}

/* ── Route Steps ── */
.route-list{display:flex;flex-direction:column;gap:0;}
.route-item{display:flex;gap:12px;position:relative;}
.route-item::before{content:'';position:absolute;left:19px;top:36px;bottom:-4px;width:2px;background:rgba(201,168,76,0.2);}
.route-item:last-child::before{display:none;}
.route-dot{width:38px;height:38px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;margin-top:4px;border:2px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.1);}
.route-dot.start{background:rgba(76,175,130,0.2);border-color:var(--green);}
.route-dot.end{background:rgba(201,168,76,0.2);border-color:var(--gold);}
.route-dot.transport{background:rgba(76,142,175,0.2);border-color:var(--blue);}
.route-body{flex:1;padding-bottom:16px;}
.route-name{font-size:14px;font-weight:600;color:var(--white);line-height:1.4;}
.route-note{font-size:12px;color:var(--gray);margin-top:3px;line-height:1.5;}
.route-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.btn-map{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);border-radius:8px;padding:5px 12px;color:var(--gold);font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn-route{background:rgba(76,142,175,0.12);border:1px solid rgba(76,142,175,0.35);border-radius:8px;padding:5px 12px;color:var(--blue);font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn-map:active,.btn-route:active{opacity:.7;}

/* ── Meal Section ── */
.meal-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;margin-top:8px;margin-bottom:16px;}

.meal-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.meal-item:last-child{border-bottom:none;}
.meal-emoji{font-size:18px;flex-shrink:0;}
.meal-body{flex:1;}
.meal-name{font-size:13px;font-weight:600;color:var(--white);}
.meal-desc{font-size:11px;color:var(--gray);margin-top:2px;}
.meal-btn{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:6px;padding:3px 8px;color:var(--gold);font-size:11px;cursor:pointer;text-decoration:none;flex-shrink:0;margin-top:2px;display:inline-block;}

.home-name{font-size:13px;font-weight:600;color:var(--green);}

/* ── Section divider ── */
.section-label{font-size:11px;color:var(--gray);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;padding-left:4px;}

// 工具函數

function openMap(lat, lng, name) {
  const isAndroid = /Android/i.test(navigator.userAgent);
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const coord = `${lat},${lng}`;
  const web = `https://www.google.com/maps/search/?api=1&query=${coord}`;
  if (isIOS) {
    const app = `comgooglemaps://?q=${coord}&center=${coord}&zoom=17`;
    const t = Date.now();
    window.location.href = app;
    setTimeout(() => { if (Date.now()-t < 1500) window.open(web,'_blank'); }, 800);
  } else if (isAndroid) {
    window.location.href = `geo:${lat},${lng}?q=${coord}`;
    setTimeout(() => window.open(web,'_blank'), 800);
  } else {
    window.open(web,'_blank');
  }
}

function openRoute(url) {
  window.open(url, '_blank');
}

// ═══════════════════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════════════════
function renderTabs() {
  const sel = document.getElementById('daySelect');
  DAYS.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = d.date + '（' + d.weekday + '） · ' + d.city;
    sel.appendChild(opt);
  });
}

function switchDay(idx) {
  idx = parseInt(idx);
  document.getElementById('daySelect').value = idx;
  document.querySelectorAll('.day-section').forEach((s,i) => s.classList.toggle('active', i===idx));
  window.scrollTo(0,0);
}

function renderContent() {
  const content = document.getElementById('mainContent');
  DAYS.forEach((d, i) => {
    const sec = document.createElement('div');
    sec.className = 'day-section' + (i === 0 ? ' active' : '');
    sec.id = 'day-' + i;

    let html = `<div class="day-header">
      <div class="day-date">${d.date}（${d.weekday}）</div>
      <div class="day-city">📍 ${d.city}</div>
    </div>`;

    html += `<div class="home-card">
      <div class="home-icon">🏠</div>
      <div class="home-body"><div class="home-name">${d.home.name}</div></div>
      <a class="home-btn" onclick="openMap(${d.home.lat},${d.home.lng},'${d.home.name}');return false;">📍 座標</a>
    </div>`;

    html += `<div class="section-label">路線</div><div class="route-list">`;
    d.routes.forEach(r => {
      const dotClass = r.type === 'end' ? 'end' : r.type === 'transport' ? 'transport' : '';
      html += `<div class="route-item">
        <div class="route-dot ${dotClass}">${r.emoji}</div>
        <div class="route-body">
          <div class="route-name">${r.name}</div>
          ${r.note ? `<div class="route-note">${r.note}</div>` : ''}
          <div class="route-actions">
            ${r.lat ? `<a class="btn-map" onclick="openMap(${r.lat},${r.lng},'${r.name}');return false;">📍 座標導航</a>` : ''}
            ${r.routeUrl ? `<a class="btn-route" href="${r.routeUrl}" target="_blank">🗺️ Google路線</a>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;

    if (d.meals && d.meals.length) {
      const mealTypes = [...new Set(d.meals.map(m => m.type))];
      mealTypes.forEach(type => {
        const items = d.meals.filter(m => m.type === type);
        html += `<div class="meal-section"><div class="meal-title">🍽️ ${type}推薦</div>`;
        items.forEach(m => {
          html += `<div class="meal-item">
            <div class="meal-emoji">${m.emoji}</div>
            <div class="meal-body">
              <div class="meal-name">${m.name}</div>
              ${m.desc ? `<div class="meal-desc">${m.desc}</div>` : ''}
              <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;">
                ${m.lat ? `<a class="meal-btn" onclick="openMap(${m.lat},${m.lng},'${m.name}');return false;">📍 座標</a>` : ''}
                ${m.routeUrl ? `<a class="meal-btn" href="${m.routeUrl}" target="_blank">🗺️ 路線</a>` : ''}
              </div>
            </div>
          </div>`;
        });
        html += `</div>`;
      });
    }

    sec.innerHTML = html;
    content.appendChild(sec);
  });
}

renderTabs();
renderContent();

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
